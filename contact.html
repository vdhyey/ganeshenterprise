<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Ganesh Enterprise</title>
  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background: url('background.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    header { display:flex; justify-content:space-between; align-items:center; padding:15px 40px; }
    .logo { display:flex; align-items:center; }
    .logo img { height:40px; margin-right:10px; }
    nav a { margin-left:20px; text-decoration:none; color:#000; }

    .container {
      max-width:500px;
      margin:60px auto;
      background: rgba(255,255,255,0.9);
      padding:30px;
      border-radius:10px;
    }

    h2 { text-align:center; }

    input, textarea {
      width:100%;
      padding:10px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:5px;
      font-size:14px;
    }

    button {
      margin-top:15px;
      padding:10px;
      width:100%;
      border:none;
      background:#000;
      color:#fff;
      border-radius:5px;
      cursor:pointer;
    }

    footer {
      border-top:1px solid #ccc;
      text-align:center;
      padding:20px;
      font-size:14px;
    }

    @media (max-width:768px) {
      header { flex-direction:column; align-items:flex-start; padding:15px 20px; }
      nav { margin-top:10px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="Logo">
    <strong>Ganesh Enterprise</strong>
  </div>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="container">
  <h2>Contact Us</h2>

  <!-- IMPORTANT: Replace action URL with your Formspree or backend endpoint -->
  <form action="mailto:vdhyey02@email.com" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
    <input type="hidden" name="_redirect" value="index.html">
    <button type="submit">Send Message</button>
  </form>
</div>

<footer>
  ganeshenterprise1417@gmail.com
</footer>

</body>
</html>
