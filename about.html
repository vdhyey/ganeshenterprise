<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About - Ganesh Enterprise</title>
 <style>
    body { margin:0; font-family: Arial, sans-serif; }

    header { display:flex; justify-content:space-between; align-items:center; padding:15px 40px; }
    .logo { display:flex; align-items:center; }
    .logo img { height:40px; margin-right:10px; max-width:100%; }
    nav a { margin-left:20px; text-decoration:none; color:#000; font-size:14px; }

    .banner {
      padding:30px 20px;
      text-align:center;
      font-size:24px;
      background: linear-gradient(to right, #6a8f2a, #e4a16f);
    }

    .banner img { margin-top:15px; max-width:150px; width:100%; }

    .container {
      max-width:500px;
      margin:40px auto;
      padding:0 20px;
      font-size:12px;
      line-height:1.5;
    }

    .box {
      border:1px solid #ccc;
      padding:15px;
      margin-top:10px;
    }

    .bottom-image { text-align:center; margin:30px 0; }
    .bottom-image img { max-width:200px; width:100%; }

    footer {
      border-top:1px solid #ccc;
      text-align:center;
      padding:20px;
      margin-top:40px;
    }

    /* MOBILE OPTIMIZATION */
    @media (max-width: 768px) {
      header { flex-direction:column; align-items:flex-start; padding:15px 20px; }
      nav { margin-top:10px; }
      nav a { margin:0 15px 0 0; display:inline-block; }

      .banner { font-size:20px; }
      .container { font-size:13px; }
    }

    @media (max-width: 480px) {
      .banner { font-size:18px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="Logo">
   
  </div>
  <nav>
    <a href="index.html">Home</a>

  </nav>
</header>

<div class="banner">About</div>

<div class="bottom-image" style="display: flex; justify-content: center;">
  <img src="ganesh.jpeg" alt="Info">
</div>

<footer>

</footer>

</body>
</html>
